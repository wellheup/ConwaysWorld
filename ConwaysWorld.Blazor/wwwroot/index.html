<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conway's World</title>
    <base href="/" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link href="css/app.css?v=3" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="ConwaysWorld.Blazor.styles.css?v=3" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#aaa;font-family:monospace;">
            Loading Conway's World…
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>
    <script src="canvas-interop.js?v=3"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // In development, force every Blazor resource to bypass the Cache API so
        // rebuilt DLLs and updated CSS are always fetched fresh after a restart.
        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                return defaultUri + (defaultUri.indexOf('?') < 0 ? '?' : '&') + '_cb=' + Date.now();
            }
        });
    </script>
</body>
</html>
