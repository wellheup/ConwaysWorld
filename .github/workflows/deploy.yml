name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ConwaysWorld.Blazor/ConwaysWorld.Blazor.csproj

      - name: Publish
        run: |
          dotnet publish ConwaysWorld.Blazor/ConwaysWorld.Blazor.csproj \
            -c Release \
            -o publish \
            --nologo \
            -p:StaticWebAssetBasePath="${{ github.event.repository.name }}"

      - name: Show publish output structure
        run: find publish -maxdepth 4 | sort

      - name: Patch index.html for GitHub Pages
        run: |
          WWWROOT=$(find publish -maxdepth 4 -name "index.html" -printf "%h\n" | head -1)
          echo "Detected wwwroot: $WWWROOT"
          REPO="${{ github.event.repository.name }}"
          # Fix base href so all assets load from the correct subdirectory
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO}/\" />|g" "$WWWROOT/index.html"
          # Remove dev-only _build.txt polling (causes 404 spam on GitHub Pages)
          python3 -c "
import re, sys
f = '$WWWROOT/index.html'
c = open(f).read()
c = re.sub(r'\s*<script>[^<]*_build\.txt.*?</script>', '', c, flags=re.DOTALL)
open(f, 'w').write(c)
"
          # Copy patched index.html as 404.html for SPA routing
          cp "$WWWROOT/index.html" "$WWWROOT/404.html"
          echo "WWWROOT=$WWWROOT" >> $GITHUB_ENV

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.WWWROOT }}
